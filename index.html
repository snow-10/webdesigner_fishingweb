<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包裹查詢練習</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-main">
            <div class="logo">
                <img src="" alt="Logo 預留位" id="logo-img" style="display: block; width: 180px; height: 50px; background-color: #eee; text-align: center; line-height: 50px; color: #999; font-size: 14px;">
            </div>
            
            <nav class="main-nav">
                <a href="#">寄件</a>
                <span class="divider">|</span>
                <a href="#">查詢</a>
                <span class="divider">|</span>
                <a href="#">客戶服務</a>
                <span class="divider">|</span>
                <a href="#">個人會員</a>
                <span class="divider">|</span>
                <a href="#">契約客戶專區</a>
            </nav>

            <div class="search-container">
                <input type="text" placeholder="站內搜尋">
                <button type="submit" class="search-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="breadcrumb-bar">
        <div class="breadcrumb-container">
            <a href="#">首頁</a> &gt; 
            <a href="#">查詢</a> &gt; 
            <a href="#">包裹查詢</a> &gt; 
            <span class="current-page">一般包裹查詢</span>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">一般包裹查詢</h2>

        <div class="form-wrapper">
            <ul class="instructions">
                <li>輸入包裹查詢號碼時請勿輸入「-」或國字或是全形數字等符號。</li>
                <li>資料保留時間僅為三個月，您將無法查詢三個月之前的資料。</li>
            </ul>

            <h3 class="form-title">包裹查詢號碼</h3>

            <div class="input-container" id="input-container">
                </div>

            <div class="button-group">
                <button type="button" id="clearBtn" class="btn">清除重填</button>
                <button type="button" id="submitBtn" class="btn">確認送出</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
